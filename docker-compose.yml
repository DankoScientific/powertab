services:
  powertab:
    build: .
    image: powertab-novnc
    container_name: powertab
    ports:
      - "6660:6080"   # host:container — change 6660 to taste; container stays 6080
    environment:
      - SCREEN_RES=1920x1080
    volumes:
      - /home/danko/tabs:/tabs   # adjust to your real host path
    restart: "no"
